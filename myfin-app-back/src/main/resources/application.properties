server.port=8080

# 1. On importe le DOSSIER (configtree crée des variables à partir des noms de fichiers)
spring.config.import=optional:configtree:/run/secrets/

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# or create, create-drop, none, validate
spring.jpa.hibernate.ddl-auto=create  
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cloud.discovery.enabled=true
spring.application.name=myfinappbackservice
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

#app.jwtSecret=${JWT_SECRET:oBSrAgQdxUhvwY0ljl1Txko99xclnvwYysjR7JX3sqFMi6B2yr13PYuxPHx9U/bK1919PYuxPHx9U/bK1919PYuxPHx9U/bg}
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationInMs=86400000


logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG